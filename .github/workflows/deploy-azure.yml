name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "mcp_servers/**"
      - "docker/**"
      - "Dockerfile"
      - "requirements.lock"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: prreviewacr95877
  IMAGE_NAME: pr-review-agent
  RESOURCE_GROUP: pr-review-agent-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image
        run: |
          IMAGE="$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"
          docker build -t "$IMAGE" -t "$ACR_NAME.azurecr.io/$IMAGE_NAME:latest" -f Dockerfile .
          docker push "$IMAGE"
          docker push "$ACR_NAME.azurecr.io/$IMAGE_NAME:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy web app
        run: |
          az containerapp update \
            --name pr-review-web \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE"

      - name: Deploy worker app
        run: |
          az containerapp update \
            --name pr-review-worker \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE"
